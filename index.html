<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>💰 SpendWise</h2>

        <nav>
            <a href="#">🏠 Dashboard</a>
            <a href="#">💳 Expenses</a>
            <a href="#">📊 Reports</a>
            <a href="#">💼 Budget</a>
            <a href="#">⚙️ Settings</a>

    <!-- Header -->
    <header class="header">
        <h1>Financial Dashboard</h1>

        <div class="user">
            Welcome, Seema Letoluo
        </div>

    <!-- Main Content -->
    <main class="content">

        <div class="card" tabindex="0">
            <h3>🍔 Food</h3>
            <p>KSh 12,500</p>
        </div>

        <div class="card" tabindex="0">

        <div class="card" tabindex="0">

        </div>

        <div class="card" tabindex="0">
            <h3>🎬 Entertainment</h3>
            <p>KSh 3,200</p>
        </div>

        <div class="card" tabindex="0">
            <h3>💰 Savings</h3>
            <p>KSh 25,000</p>
        </div>

        <div class="card" tabindex="0">
            <h3>💡 Utilities</h3>
